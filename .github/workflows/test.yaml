name: "Test Dev Container Features"
on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Get changed features"
        id: changed
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_REF="${BASE_REF:-main}"
          changed_features=$(git diff --name-only origin/$BASE_REF...HEAD -- .devcontainer/src/ .devcontainer/test/ | \
            grep -oP '\.devcontainer/(src|test)/\K[^/]+' | \
            sort -u | \
            tr '\n' ',' | \
            sed 's/,$//')
          echo "features=$changed_features" >> $GITHUB_OUTPUT
          echo "Changed features: $changed_features"
      - name: "Install devcontainer CLI"
        if: steps.changed.outputs.features != ''
        run: npm install -g @devcontainers/cli
      - name: "Test features"
        if: steps.changed.outputs.features != ''
        run: |
          for feature in ${{ steps.changed.outputs.features }}; do
            case "$feature" in
              lib|common-utils)
                base_image="buildpack-deps:noble-curl"
                ;;
              devbox)
                base_image="ghcr.io/devopsbuildingblocks/devcontainer-images/ubuntu-base:latest"
                ;;
              *)
                base_image="ghcr.io/devopsbuildingblocks/devcontainer-images/ubuntu-devbox:latest"
                ;;
            esac
            echo "Testing $feature with base image: $base_image"
            devcontainer features test --project-folder ./.devcontainer --features "$feature" --base-image "$base_image"
          done
      - name: "No features changed"
        if: steps.changed.outputs.features == ''
        run: echo "No feature changes detected, skipping tests"
